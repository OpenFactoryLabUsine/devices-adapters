name: CNC

on:
  push:
    paths:
      - "cnc/**"
      - "opcua_base/**"
      - ".github/workflows/cnc.yml"
  pull_request:
    paths:
      - "cnc/**"
      - "opcua_base/**"
      - ".github/workflows/cnc.yml"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r cnc/requirements.txt
          pip install -r cnc/requirements-dev.txt

      - name: Run tests
        run: pytest cnc/tests/ -v

  build:
    name: Build & Push
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: cnc/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/virtual-cnc-adapter:latest
            ghcr.io/${{ github.repository_owner }}/virtual-cnc-adapter:${{ github.sha }}
