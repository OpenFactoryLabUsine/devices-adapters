name: Virtual adapters

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-and-build:
    name: "${{ matrix.device.name }}"
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        device:
          - name: virtual-cnc
            dir: cnc
            image: virtual-cnc-adapter
            run_tests: true
          - name: virtual-dust-trak
            dir: dust_trak
            image: virtual-dusttrak-adapter
            run_tests: false
          - name: virtual-wtvb01
            dir: wtvb01
            image: virtual-wtvb01-adapter
            run_tests: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r ${{ matrix.device.dir }}/requirements.txt
          
      - name: Install Xvfb
        if: matrix.device.dir == 'dust_trak'
        run: sudo apt-get install -y xvfb

      - name: Run tests
        if: matrix.device.run_tests
        run: pytest ${{ matrix.device.dir }}/tests/ -v
        
      - name: Lowercase repository owner
        run: echo "repository_owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.device.dir }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.repository_owner }}/${{ matrix.device.image }}:latest
            ghcr.io/${{ env.repository_owner }}/${{ matrix.device.image }}:${{ github.sha }}
